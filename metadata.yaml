name: astrbot_plugin_roleplay
desc: 动漫角色扮演插件，支持角色ZIP开箱即用、情感引擎、TTS语音合成、短中长期记忆系统、语气词音频、FunctionCall工具调用、特殊日期自动回复、知识库联网更新、分享前隐私清洗
version: 1.2.0
author: kunxun
repo: https://github.com/kunxun/astrbot_plugin_roleplay
support_platforms:
  - aiocqhttp
  - qq_official
  - webchat
  - telegram
  - discord
help: |
  角色扮演插件 v1.2.0 使用指南
  ================
  QQ频道命令：
    /role list    - 列出已安装角色
    /role switch <角色名>  - 切换角色
    /role status  - 查看角色状态
    /role off     - 关闭角色扮演
    /role ttstest [文本]   - 测试TTS链路

  WebUI 管理页面（端口 6185）：
    /api/plug/roleplay/dashboard      → 插件管理中心
    /api/plug/roleplay/export_page    → 导出角色（仅含角色知识，不含用户隐私）
    /api/plug/roleplay/shop           → 角色商店
    /api/plug/roleplay/memory_view    → 记忆管理器
    /api/plug/roleplay/upload         → 角色上传
    /api/plug/roleplay/special_dates  → 特殊日期可视化编辑器

  新功能 v1.2.0：
    🤖 FunctionCall 工具调用 - LLM可主动调用 weather/calculate/web_search/get_time/shell_exec
      - 善良本性驱动：角色会因为想帮朋友而主动查天气、搜资料
      - shell_exec 仅白名单命令可用，rm/del/shutdown/kill 等危险命令自动拦截
      - 角色在系统提示词中看到工具列表，自然选择何时使用
    🧠 记忆系统 v2.0 双通道 - user_facts(永不出) + role_facts(可导出)
    📂 raw_history 按月分块归档 - 无上限，可二次查询（关键词/发送者/月份）
    🎵 语气词音频命令标签 - [tts]/[audio:害羞]/[music:歌名]，模型主动触发
    ⏰ 启动延迟保护 - 自动回复首次触发延迟60-180分钟，避免模型未就绪
    🔒 导出仅含角色知识 - raw_history/user_facts 永不打包

  v1.1.0 已有功能：
    🎵 语气词音频系统 - 角色目录下 audio/expressions/ 存放MP3
    📅 特殊日期可视化编辑器 - 每行一条 MM-DD | 名称 | 说明
    🔒 导出隐私保护 - 自动过滤使用者生日、用户名

  角色 ZIP 目录结构：
    config.yaml          - 角色配置（生日、性格、情绪、语音等）
    audio/               - 音频文件夹
      audio_map.json     - 音频分类映射
      expressions/       - 语气词音频 (*.mp3)
      music/             - 音乐音频 (*.mp3)
    images/              - 角色图片
    knowledge_base.json  - 知识库

  TTS 语音引擎配置：
    GPT-SoVITS（本地）: 填写 API 地址（默认 http://127.0.0.1:9880）
    云端 TTS: 填写 API 地址和密钥
    Edge TTS: 选择语音（如 zh-CN-XiaoxiaoNeural）

  可信任服务器 API（需服务器端实现）：
    GET  /api/roles                       → 角色列表
    GET  /api/roles/{name}/download       → 下载角色ZIP
    POST /api/roles/share                 → 分享角色
    GET  /api/roles/{name}/audio          → 角色音频文件列表
    GET  /api/roles/{name}/audio/{cat}/{file} → 下载单个音频

  启动顺序：先启动 GPT-SoVITS 语音服务，再启动 AstrBot
